<script src="vocab-data.js"></script>

<style>
:root {
  --bg:#0d1117; --sidebar:#0d1117; --paper:#161b22; --card:#1c2128;
  --border:#30363d; --text:#e6edf3; --muted:#8b949e; --hover:#21262d;
  --active:#1f6feb; --active-bg:rgba(31,111,235,0.15); --sw:282px;
  --c1:#e8c07d; --c2:#7ec8c8; --c3:#f28b6e; --c4:#a8d8a8;
  --c5:#c9a84c; --c6:#58a6ff; --c7:#f0883e; --c8:#3fb950;
  --c9:#ff7b72; --ca:#d2a8ff; --cb:#79c0ff; --v:#b392f0; --v2:rgba(179,146,240,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Lora',Georgia,serif;font-size:16px;line-height:1.9;display:flex;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
#sidebar{width:var(--sw);min-width:var(--sw);background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden;transition:transform .3s;z-index:100;}
.sb-head{padding:16px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-head h2{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--c1);line-height:1.3;}
.sb-head p{font-size:10.5px;color:var(--muted);margin-top:2px;font-style:italic;}
.sb-search{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-search input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-size:12px;font-family:'Lora',serif;outline:none;transition:border-color .2s;}
.sb-search input:focus{border-color:var(--active);}
.sb-search input::placeholder{color:var(--muted);}
.sb-tree{flex:1;overflow-y:auto;padding:6px 0;}
.sb-tree::-webkit-scrollbar{width:3px;}
.sb-tree::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* FOLDER */
.folder-head{display:flex;align-items:center;gap:7px;padding:7px 12px;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);user-select:none;transition:color .2s;}
.folder-head:hover{color:var(--text);}
.folder-arrow{font-size:8px;transition:transform .22s;flex-shrink:0;}
.folder.open .folder-arrow{transform:rotate(90deg);}
.folder-badge{margin-left:auto;font-size:10px;background:var(--card);border:1px solid var(--border);padding:1px 6px;border-radius:10px;color:var(--muted);letter-spacing:0;text-transform:none;font-weight:400;}
.folder-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
.folder-items{display:none;}
.folder.open .folder-items{display:block;}

/* SUB-FOLDER */
.subfolder-head{display:flex;align-items:center;gap:7px;padding:5px 12px 5px 24px;cursor:pointer;font-size:11px;font-weight:600;color:var(--muted);user-select:none;transition:color .2s;}
.subfolder-head:hover{color:var(--text);}
.subfolder-arrow{font-size:7px;transition:transform .22s;flex-shrink:0;}
.subfolder.open .subfolder-arrow{transform:rotate(90deg);}
.subfolder-badge{margin-left:auto;font-size:10px;background:var(--card);border:1px solid var(--border);padding:1px 6px;border-radius:10px;color:var(--muted);font-weight:400;}
.subfolder-items{display:none;}
.subfolder.open .subfolder-items{display:block;}

/* CHAPTER ITEM */
.chap-item{display:flex;align-items:center;gap:7px;padding:5px 12px 5px 34px;cursor:pointer;font-size:12.5px;color:var(--muted);transition:all .15s;border-left:2px solid transparent;user-select:none;}
.chap-item:hover{color:var(--text);background:var(--hover);}
.chap-item.active{color:var(--text);background:var(--active-bg);border-left-color:var(--active);font-weight:500;}
.chap-item .ci-num{font-size:9.5px;color:var(--muted);min-width:16px;flex-shrink:0;}
.chap-item.active .ci-num{color:var(--active);}
.chap-item .ci-title{line-height:1.3;flex:1;}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#topbar{height:46px;min-height:46px;background:var(--paper);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 18px;flex-shrink:0;}
#menu-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:17px;padding:4px;display:none;line-height:1;}
#breadcrumb{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:5px;flex:1;min-width:0;}
#breadcrumb .bc-sep{opacity:.4;}
#breadcrumb .bc-chapter{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#nav-btns{display:flex;gap:5px;margin-left:auto;}
.nav-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:4px 11px;border-radius:5px;cursor:pointer;font-size:11.5px;font-family:'Lora',serif;transition:all .2s;white-space:nowrap;}
.nav-btn:hover{color:var(--text);border-color:var(--active);}
.nav-btn:disabled{opacity:.3;cursor:default;}
#content{flex:1;overflow-y:auto;padding:36px 42px 80px;}
#content::-webkit-scrollbar{width:4px;}
#content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ── HOME ── */
.home-screen{max-width:680px;margin:0 auto;}
.home-screen h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.6rem);color:var(--c1);font-weight:700;text-shadow:0 0 40px rgba(232,192,125,.2);margin-bottom:6px;}
.home-screen h1 em{color:var(--c2);font-style:italic;}
.home-screen .hs-sub{color:var(--muted);font-size:13px;font-style:italic;margin-bottom:28px;}
.legend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:7px;margin-bottom:28px;}
.lg-item{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:9px 11px;font-size:12px;color:var(--muted);}
.lg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.how-to{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px 20px;}
.how-to h3{font-size:12px;color:var(--c1);margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase;}
.how-to p{font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:6px;}
.how-to code{background:var(--bg);border:1px solid var(--border);padding:1px 7px;border-radius:4px;font-size:11.5px;color:var(--c4);font-family:monospace;}

/* ── CHAPTER VIEW ── */
.chapter-view{max-width:720px;margin:0 auto;}
.cv-header{margin-bottom:22px;}
.cv-tag{display:inline-block;font-size:9.5px;letter-spacing:2.5px;text-transform:uppercase;padding:3px 11px;border-radius:2px;margin-bottom:10px;font-family:'Lora',serif;font-weight:700;}
.cv-title{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(1.3rem,3vw,1.8rem);color:var(--c1);margin-bottom:5px;line-height:1.3;}
.cv-desc{font-size:13px;color:var(--muted);line-height:1.75;margin-bottom:14px;}
.note-box{border-left:3px solid var(--v);border-radius:8px;padding:13px 16px;margin-bottom:16px;font-size:13px;color:var(--muted);line-height:1.8;background:rgba(179,146,240,0.06);border:1px solid rgba(179,146,240,0.2);border-left:3px solid var(--v);}
.note-box b{color:var(--v);}
.note-box.grammar{background:rgba(232,192,125,0.05);border-color:rgba(232,192,125,0.2);border-left-color:var(--c1);}
.note-box.grammar b{color:var(--c1);}
.rule-card{border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;line-height:1.75;border-left:3px solid;}
.rule-card b{font-weight:600;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 18px;}
.chip{font-size:12px;padding:3px 12px;border-radius:20px;font-family:'Lora',serif;}
.stb{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px 24px;margin-bottom:9px;position:relative;transition:border-color .3s;}
.stb:hover{border-color:rgba(255,255,255,.08);}
.stb::before{content:attr(data-n);position:absolute;top:-10px;left:15px;background:var(--bg);padding:0 6px;font-size:9.5px;color:var(--muted);letter-spacing:1px;font-family:'Lora',serif;}
.stb p{font-size:15.5px;color:#cdd9e5;}
.divider{display:flex;align-items:center;gap:11px;margin:22px 0;opacity:.35;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--c1),transparent);}
.divider span{color:var(--c1);font-size:13px;}
.chap-nav{display:flex;justify-content:space-between;align-items:center;margin-top:34px;padding-top:20px;border-top:1px solid var(--border);}
.cn-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:6px;cursor:pointer;font-size:12.5px;font-family:'Lora',serif;transition:all .2s;max-width:45%;}
.cn-btn:hover{color:var(--text);border-color:var(--active);}
.cn-btn:disabled{opacity:.3;cursor:default;}
.cn-btn .cn-label{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:2px;}
.cn-btn .cn-name{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── GRAMMAR HIGHLIGHTS ── */
.h1,.h2,.h3,.h4,.h5,.h6,.h7,.h8,.h9,.ha,.hb{font-weight:500;border-bottom:1px solid;cursor:default;transition:.2s;}
.h1{color:var(--c1);border-color:rgba(232,192,125,.4);} .h1:hover{background:rgba(232,192,125,.1);border-radius:3px;}
.h2{color:var(--c2);border-color:rgba(126,200,200,.4);} .h2:hover{background:rgba(126,200,200,.1);border-radius:3px;}
.h3{color:var(--c3);border-color:rgba(242,139,110,.4);} .h3:hover{background:rgba(242,139,110,.1);border-radius:3px;}
.h4{color:var(--c4);border-color:rgba(168,216,168,.4);} .h4:hover{background:rgba(168,216,168,.1);border-radius:3px;}
.h5{color:var(--c5);border-color:rgba(201,168,76,.4);}  .h5:hover{background:rgba(201,168,76,.1);border-radius:3px;}
.h6{color:var(--c6);border-color:rgba(88,166,255,.4);}  .h6:hover{background:rgba(88,166,255,.1);border-radius:3px;}
.h7{color:var(--c7);border-color:rgba(240,136,62,.4);}  .h7:hover{background:rgba(240,136,62,.1);border-radius:3px;}
.h8{color:var(--c8);border-color:rgba(63,185,80,.4);}   .h8:hover{background:rgba(63,185,80,.1);border-radius:3px;}
.h9{color:var(--c9);border-color:rgba(255,123,114,.4);} .h9:hover{background:rgba(255,123,114,.1);border-radius:3px;}
.ha{color:var(--ca);border-color:rgba(210,168,255,.4);} .ha:hover{background:rgba(210,168,255,.1);border-radius:3px;}
.hb{color:var(--cb);border-color:rgba(121,192,255,.4);} .hb:hover{background:rgba(121,192,255,.1);border-radius:3px;}

/* ── VOCAB TOOLTIP ── */
.vw{color:var(--v);font-weight:500;border-bottom:1px dashed rgba(179,146,240,.5);cursor:pointer;position:relative;display:inline;}
.vw:hover{background:var(--v2);border-radius:3px;}
.tooltip{display:none;position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:#1b1728;border:1px solid rgba(179,146,240,.35);border-radius:10px;padding:13px 15px;width:272px;z-index:9999;box-shadow:0 10px 40px rgba(0,0,0,.7);pointer-events:none;}
.vw:hover .tooltip{display:block;}
.tt-word{font-family:'Playfair Display',serif;font-size:14px;color:var(--v);font-weight:700;margin-bottom:3px;}
.tt-pos{display:inline-block;font-size:9.5px;background:rgba(179,146,240,.12);color:var(--v);border:1px solid rgba(179,146,240,.25);padding:1px 7px;border-radius:10px;margin-bottom:7px;letter-spacing:1px;text-transform:uppercase;font-weight:600;}
.tt-hindi{font-size:12.5px;color:#e8c07d;font-weight:500;margin-bottom:7px;}
.tt-meaning{font-size:12px;color:#cdd9e5;line-height:1.6;margin-bottom:7px;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:7px;}
.tt-example-label{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px;}
.tt-example{font-size:12px;color:#7ec8c8;font-style:italic;line-height:1.55;}
.tt-arrow{position:absolute;bottom:-5px;left:50%;width:9px;height:9px;background:#1b1728;border-right:1px solid rgba(179,146,240,.35);border-bottom:1px solid rgba(179,146,240,.35);transform:translateX(-50%) rotate(45deg);}

/* color classes */
.t1{background:rgba(232,192,125,.1);color:var(--c1);border:1px solid rgba(232,192,125,.25);}
.t2{background:rgba(126,200,200,.1);color:var(--c2);border:1px solid rgba(126,200,200,.25);}
.t3{background:rgba(242,139,110,.1);color:var(--c3);border:1px solid rgba(242,139,110,.25);}
.t4{background:rgba(168,216,168,.1);color:var(--c4);border:1px solid rgba(168,216,168,.25);}
.t5{background:rgba(201,168,76,.1); color:var(--c5);border:1px solid rgba(201,168,76,.25);}
.t6{background:rgba(88,166,255,.1); color:var(--c6);border:1px solid rgba(88,166,255,.25);}
.t7{background:rgba(240,136,62,.1); color:var(--c7);border:1px solid rgba(240,136,62,.25);}
.t8{background:rgba(63,185,80,.1);  color:var(--c8);border:1px solid rgba(63,185,80,.25);}
.t9{background:rgba(255,123,114,.1);color:var(--c9);border:1px solid rgba(255,123,114,.25);}
.ta{background:rgba(210,168,255,.1);color:var(--ca);border:1px solid rgba(210,168,255,.25);}
.tb{background:rgba(121,192,255,.1);color:var(--cb);border:1px solid rgba(121,192,255,.25);}
.tv{background:var(--v2);color:var(--v);border:1px solid rgba(179,146,240,.25);}
.r1{background:rgba(232,192,125,.07);border-color:var(--c1);} .r1 b{color:var(--c1);}
.r2{background:rgba(126,200,200,.07);border-color:var(--c2);} .r2 b{color:var(--c2);}
.r3{background:rgba(242,139,110,.07);border-color:var(--c3);} .r3 b{color:var(--c3);}
.r4{background:rgba(168,216,168,.07);border-color:var(--c4);} .r4 b{color:var(--c4);}
.r5{background:rgba(201,168,76,.07); border-color:var(--c5);} .r5 b{color:var(--c5);}
.r6{background:rgba(88,166,255,.07); border-color:var(--c6);} .r6 b{color:var(--c6);}
.r7{background:rgba(240,136,62,.07); border-color:var(--c7);} .r7 b{color:var(--c7);}
.r8{background:rgba(63,185,80,.07);  border-color:var(--c8);} .r8 b{color:var(--c8);}
.r9{background:rgba(255,123,114,.07);border-color:var(--c9);} .r9 b{color:var(--c9);}
.ra{background:rgba(210,168,255,.07);border-color:var(--ca);} .ra b{color:var(--ca);}
.rb{background:rgba(121,192,255,.07);border-color:var(--cb);} .rb b{color:var(--cb);}
.rv{background:rgba(179,146,240,.07);border-color:var(--v);}  .rv b{color:var(--v);}

/* ── OVERLAY ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:99;backdrop-filter:blur(2px);}
#overlay.show{display:block;}

/* ── MOBILE: 700px and below ── */
@media(max-width:700px){
  :root{ --sw:285px; }

  body{ font-size:15px; }

  /* Show hamburger */
  #menu-btn{ display:block !important; }

  /* Sidebar slides in from left */
  #sidebar{
    position:fixed; left:0; top:0;
    height:100%; height:100dvh;
    transform:translateX(-101%);
    box-shadow:4px 0 24px rgba(0,0,0,.5);
  }
  #sidebar.open{ transform:translateX(0); }

  /* Topbar */
  #topbar{ padding:0 12px; gap:8px; height:50px; min-height:50px; }
  #breadcrumb{ font-size:11.5px; }
  #bc-sec{ max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* Hide prev/next text on small screens, show arrows only */
  .nav-btn{ padding:6px 10px; font-size:13px; }

  /* Content area */
  #content{ padding:20px 14px 100px; }

  /* Chapter view */
  .chapter-view{ max-width:100%; }
  .cv-title{ font-size:1.25rem; }
  .cv-desc{ font-size:12.5px; }

  /* Story blocks */
  .stb{ padding:16px 14px; }
  .stb p{ font-size:14.5px; line-height:1.85; }

  /* Rule cards */
  .rule-card{ font-size:12.5px; padding:11px 13px; }

  /* Note box */
  .note-box{ font-size:12.5px; padding:11px 13px; }

  /* Chips */
  .chip{ font-size:11.5px; padding:3px 10px; }

  /* Home screen */
  .home-screen h1{ font-size:1.6rem; }
  .legend-grid{ grid-template-columns:1fr 1fr; gap:6px; }
  .lg-item{ font-size:11px; padding:7px 9px; }
  .how-to p{ font-size:12px; }

  /* Chapter nav footer */
  .chap-nav{ gap:8px; }
  .cn-btn{ padding:8px 12px; font-size:12px; max-width:48%; }
  .cn-btn .cn-name{ font-size:11px; }

  /* Install button */
  #installBtn{ font-size:10.5px; padding:4px 9px; }
}

/* ── EXTRA SMALL: 400px ── */
@media(max-width:400px){
  #content{ padding:16px 12px 90px; }
  .stb p{ font-size:14px; }
  .legend-grid{ grid-template-columns:1fr; }
  .nav-btn{ padding:5px 8px; font-size:12px; }
  #bc-sec{ display:none; }
  #bc-sep{ display:none !important; }
}

/* ── VOCAB TOOLTIP — Mobile tap support ── */
@media(max-width:700px){
  /* On mobile tooltip shows on tap, not hover */
  .vw .tooltip{
    position:fixed;
    bottom:0; left:0; right:0;
    width:100%;
    transform:none;
    border-radius:16px 16px 0 0;
    border:none;
    border-top:1px solid rgba(179,146,240,.35);
    padding:20px 18px 32px;
    box-shadow:0 -8px 40px rgba(0,0,0,.8);
    z-index:99999;
    max-height:70vh;
    overflow-y:auto;
  }
  .vw .tooltip .tt-arrow{ display:none; }
  .tt-word{ font-size:16px; margin-bottom:6px; }
  .tt-pos{ font-size:11px; margin-bottom:9px; }
  .tt-hindi{ font-size:14px; margin-bottom:9px; }
  .tt-meaning{ font-size:13px; line-height:1.7; margin-bottom:9px; padding-bottom:9px; }
  .tt-example{ font-size:13px; line-height:1.65; }
  .tt-example-label{ font-size:10px; margin-bottom:5px; }

  /* Tap close button */
  .tt-close{
    display:block;
    text-align:center;
    font-size:11px;
    color:var(--muted);
    margin-top:14px;
    padding:8px;
    background:rgba(255,255,255,0.05);
    border-radius:6px;
    cursor:pointer;
  }
}
@media(min-width:701px){
  .tt-close{ display:none; }
}
</style>
</head>
<body>
<div id="overlay" onclick="closeSidebar()"></div>

<div id="sidebar">
  <div class="sb-head">
    <h2>📚 Aryan's Grammar & Vocab Book</h2>
    <p>Grammar · SSC Vocabulary · Daily Reading</p>
  </div>
  <div class="sb-search">
    <input type="text" id="searchBox" placeholder="🔍 Search chapters..." oninput="filterChapters(this.value)">
  </div>
  <div class="sb-tree" id="sbTree"></div>
</div>

<div id="main">
  <div id="topbar">
    <button id="menu-btn" onclick="toggleSidebar()">☰</button>
    <div id="breadcrumb">
      <span id="bc-sec" style="color:var(--muted)">Home</span>
      <span class="bc-sep" id="bc-sep" style="display:none;opacity:.4"> › </span>
      <span class="bc-chapter" id="bc-chap"></span>
    </div>
    
    <button id="installBtn" onclick="installApp()" style="display:none;align-items:center;gap:5px;background:rgba(179,146,240,0.12);border:1px solid rgba(179,146,240,0.3);color:#b392f0;padding:4px 11px;border-radius:5px;cursor:pointer;font-size:11px;font-family:'Lora',serif;margin-left:auto;white-space:nowrap;">
      ⬇ Install App
    </button>
    <div id="nav-btns">
      <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>← Prev</button>
      <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Next →</button>
    </div>
  </div>
  <div id="content"></div>
</div>

<script>
// ═══════════════════════════════════════════
//  ENGINE  (do NOT edit this file for data)
//  Edit grammar-data.js or vocab-data.js
// ═══════════════════════════════════════════

// Merge both data sources
const BOOK = [...GRAMMAR_DATA, ...VOCAB_DATA];

// Flatten all chapters
const ALL_CHAPTERS = [];
BOOK.forEach(folder => {
  if(folder.type === 'vocab-folder') {
    folder.subfolders.forEach(sf => {
      sf.chapters.forEach(ch => {
        ALL_CHAPTERS.push({...ch, folderLabel:folder.label, folderId:folder.id, subfolderId:sf.id, subfolderLabel:sf.label});
      });
    });
  } else {
    folder.chapters.forEach(ch => {
      ALL_CHAPTERS.push({...ch, folderLabel:folder.label, folderId:folder.id, subfolderId:null, subfolderLabel:null});
    });
  }
});

let currentIdx = -1;

// ── Build Sidebar ──
function buildSidebar(filter='') {
  const tree = document.getElementById('sbTree');
  tree.innerHTML = '';
  const fl = filter.toLowerCase();

  BOOK.forEach(folder => {
    const div = document.createElement('div');
    div.className = 'folder open';

    if(folder.type === 'vocab-folder') {
      const matchedAny = folder.subfolders.some(sf =>
        sf.chapters.some(ch => !fl || ch.title.toLowerCase().includes(fl) || folder.label.toLowerCase().includes(fl) || sf.label.toLowerCase().includes(fl))
      );
      if(fl && !matchedAny) return;
      const total = folder.subfolders.reduce((a,s) => a + s.chapters.length, 0);
      div.innerHTML = `
        <div class="folder-head" onclick="toggleFolder(this)">
          <span class="folder-arrow">▶</span>
          <div class="folder-dot chip tv" style="border-radius:2px;padding:0;width:7px;height:7px;border:none;background:var(--v);"></div>
          <span>${folder.label}</span>
          <span class="folder-badge">${total}</span>
        </div>
        <div class="folder-items"></div>`;
      tree.appendChild(div);
      const fi = div.querySelector('.folder-items');
      folder.subfolders.forEach(sf => {
        const matchedChs = sf.chapters.filter(ch => !fl || ch.title.toLowerCase().includes(fl) || sf.label.toLowerCase().includes(fl) || folder.label.toLowerCase().includes(fl));
        if(fl && matchedChs.length === 0) return;
        const sfDiv = document.createElement('div');
        sfDiv.className = 'subfolder open';
        sfDiv.innerHTML = `
          <div class="subfolder-head" onclick="toggleSubfolder(this)">
            <span class="subfolder-arrow">▶</span>
            <span>${sf.label}</span>
            <span class="subfolder-badge">${sf.chapters.length}</span>
          </div>
          <div class="subfolder-items"></div>`;
        fi.appendChild(sfDiv);
        const sfi = sfDiv.querySelector('.subfolder-items');
        matchedChs.forEach(ch => {
          const gi = ALL_CHAPTERS.findIndex(c => c.id === ch.id);
          const item = document.createElement('div');
          item.className = 'chap-item' + (gi === currentIdx ? ' active' : '');
          item.innerHTML = `<span class="ci-num">${gi+1}</span><span class="ci-title">${ch.title}</span>`;
          item.onclick = () => openChapter(gi);
          sfi.appendChild(item);
        });
      });
    } else {
      const matchedChs = folder.chapters.filter(ch => !fl || ch.title.toLowerCase().includes(fl) || folder.label.toLowerCase().includes(fl));
      if(fl && matchedChs.length === 0) return;
      const dotBg = folder.color || '#888';
      div.innerHTML = `
        <div class="folder-head" onclick="toggleFolder(this)">
          <span class="folder-arrow">▶</span>
          <div class="folder-dot" style="background:${dotBg};border-radius:2px;"></div>
          <span>${folder.label}</span>
          <span class="folder-badge">${folder.chapters.length}</span>
        </div>
        <div class="folder-items"></div>`;
      tree.appendChild(div);
      const fi = div.querySelector('.folder-items');
      matchedChs.forEach(ch => {
        const gi = ALL_CHAPTERS.findIndex(c => c.id === ch.id);
        const item = document.createElement('div');
        item.className = 'chap-item' + (gi === currentIdx ? ' active' : '');
        item.innerHTML = `<span class="ci-num">${gi+1}</span><span class="ci-title">${ch.title}</span>`;
        item.onclick = () => openChapter(gi);
        fi.appendChild(item);
      });
    }
  });
}

function toggleFolder(h){ h.parentElement.classList.toggle('open'); }
function toggleSubfolder(h){ h.parentElement.classList.toggle('open'); }
function filterChapters(v){ buildSidebar(v); }

function openChapter(idx){
  currentIdx = idx;
  buildSidebar(document.getElementById('searchBox').value);
  renderChapter(idx);
  if(window.innerWidth <= 700) closeSidebar();
  document.getElementById('content').scrollTop = 0;
}

function renderChapter(idx){
  const ch = ALL_CHAPTERS[idx];
  const folder = BOOK.find(f => f.id === ch.folderId);
  document.getElementById('bc-sec').textContent = ch.subfolderLabel ? `${folder.label} › ${ch.subfolderLabel}` : folder.label;
  document.getElementById('bc-sep').style.display = '';
  document.getElementById('bc-chap').textContent = ch.title;
  document.getElementById('prevBtn').disabled = idx <= 0;
  document.getElementById('nextBtn').disabled = idx >= ALL_CHAPTERS.length - 1;

  const chipsHtml = ch.chips.words.map(w => `<span class="chip ${ch.chips.cls}">${w}</span>`).join('');
  const noteHtml  = ch.note     ? `<div class="note-box ${ch.type==='grammar'?'grammar':''}">${ch.note}</div>` : '';
  const ruleHtml  = ch.ruleCard ? `<div class="rule-card ${ch.ruleCard.cls}">${ch.ruleCard.html}</div>` : '';
  const parasHtml = ch.paras.map(p => `<div class="stb" data-n="${p.n}"><p>${p.text}</p></div>`).join('');
  const recallHtml= ch.recallTest ? `<div class="note-box" style="margin-top:16px"><b>📝 Quick Recall:</b> Bina hover kiye try karo —<br><span style="color:var(--v)">${ch.recallTest}</span></div>` : '';
  const prevCh = idx > 0 ? ALL_CHAPTERS[idx-1] : null;
  const nextCh = idx < ALL_CHAPTERS.length-1 ? ALL_CHAPTERS[idx+1] : null;

  document.getElementById('content').innerHTML = `
    <div class="chapter-view">
      <div class="cv-header">
        <span class="cv-tag ${ch.tagClass}">${ch.tag}</span>
        <div class="cv-title">${ch.subtitle}</div>
        <div class="cv-desc">${ch.desc||''}</div>
      </div>
      ${noteHtml}${ruleHtml}
      <div class="chips">${chipsHtml}</div>
      <div class="divider"><span>✦</span></div>
      ${parasHtml}
      ${recallHtml}
      <div class="chap-nav">
        <button class="cn-btn" onclick="navigate(-1)" ${!prevCh?'disabled':''} style="text-align:left">
          <span class="cn-label">← Previous</span>
          <span class="cn-name">${prevCh?prevCh.title:'—'}</span>
        </button>
        <button class="cn-btn" onclick="navigate(1)" ${!nextCh?'disabled':''} style="text-align:right">
          <span class="cn-label">Next →</span>
          <span class="cn-name">${nextCh?nextCh.title:'—'}</span>
        </button>
      </div>
    </div>`;

  // Build vocab tooltips — hover (desktop) + tap (mobile)
  document.querySelectorAll('.vw').forEach(el => {
    const tt = document.createElement('div');
    tt.className = 'tooltip';
    tt.innerHTML = `
      <div class="tt-word">${el.dataset.word}</div>
      <div class="tt-pos">${el.dataset.pos}</div>
      <div class="tt-hindi">${el.dataset.hindi}</div>
      <div class="tt-meaning">${el.dataset.meaning}</div>
      <div class="tt-example-label">Example</div>
      <div class="tt-example">${el.dataset.example}</div>
      <div class="tt-close" onclick="this.closest('.tooltip').style.display='none'">✕ Tap to close</div>
      <div class="tt-arrow"></div>`;
    el.appendChild(tt);

    const isMobile = () => window.innerWidth <= 700;

    // Desktop: hover
    el.addEventListener('mouseenter', function(){
      if(isMobile()) return;
      const t = this.querySelector('.tooltip');
      t.style.cssText=''; t.style.display='block';
      const r = t.getBoundingClientRect();
      if(r.left < 8){ t.style.left='0'; t.style.transform='none'; }
      else if(r.right > window.innerWidth-8){ t.style.left='auto'; t.style.right='0'; t.style.transform='none'; }
    });
    el.addEventListener('mouseleave', function(){
      if(isMobile()) return;
      const t = this.querySelector('.tooltip');
      if(t) t.style.display='none';
    });

    // Mobile: tap toggle
    el.addEventListener('click', function(e){
      if(!isMobile()) return;
      e.stopPropagation();
      // Close all other open tooltips first
      document.querySelectorAll('.tooltip').forEach(other => {
        if(other !== this.querySelector('.tooltip')) other.style.display='none';
      });
      const t = this.querySelector('.tooltip');
      t.style.display = t.style.display === 'block' ? 'none' : 'block';
    });
  });

  // Tap anywhere else to close tooltip on mobile
  document.addEventListener('click', function(){
    if(window.innerWidth <= 700){
      document.querySelectorAll('.tooltip').forEach(t => t.style.display='none');
    }
  });
}

function navigate(dir){
  const n = currentIdx + dir;
  if(n < 0){ renderHome(); return; }
  if(n >= ALL_CHAPTERS.length) return;
  openChapter(n);
}

function renderHome(){
  currentIdx = -1;
  buildSidebar();
  document.getElementById('bc-sec').textContent = 'Home';
  document.getElementById('bc-sep').style.display = 'none';
  document.getElementById('bc-chap').textContent = '';
  document.getElementById('prevBtn').disabled = true;
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('content').innerHTML = `
    <div class="home-screen">
      <h1>Aryan's <em>Grammar & Vocab</em> Book</h1>
      <p class="hs-sub">Grammar · SSC Vocabulary · Daily Reading · ${ALL_CHAPTERS.length} Chapters</p>
      <div class="legend-grid">
        <div class="lg-item"><div class="lg-dot" style="background:var(--c1)"></div><span><b style="color:var(--c1)">Warm Gold</b> — how to + V1</span></div>
        <div class="lg-item"><div class="lg-dot" style="background:var(--c2)"></div><span><b style="color:var(--c2)">Teal</b> — to + V1</span></div>
        <div class="lg-item"><div class="lg-dot" style="background:var(--c3)"></div><span><b style="color:var(--c3)">Coral</b> — obj + to + V1</span></div>
        <div class="lg-item"><div class="lg-dot" style="background:var(--c4)"></div><span><b style="color:var(--c4)">Mint</b> — bare infinitive</span></div>
        <div class="lg-item"><div class="lg-dot" style="background:var(--c5)"></div><span><b style="color:var(--c5)">Gold</b> — gerund</span></div>
        <div class="lg-item"><div class="lg-dot" style="background:var(--c6)"></div><span><b style="color:var(--c6)">Blue</b> — "as" group</span></div>
        <div class="lg-item"><div class="lg-dot" style="background:var(--c7)"></div><span><b style="color:var(--c7)">Orange</b> — no "as"</span></div>
        <div class="lg-item"><div class="lg-dot" style="background:var(--c8)"></div><span><b style="color:var(--c8)">Green</b> — reflexive required</span></div>
        <div class="lg-item"><div class="lg-dot" style="background:var(--c9)"></div><span><b style="color:var(--c9)">Red</b> — no reflexive</span></div>
        <div class="lg-item"><div class="lg-dot" style="background:var(--ca)"></div><span><b style="color:var(--ca)">Violet</b> — no possessive</span></div>
        <div class="lg-item"><div class="lg-dot" style="background:var(--cb)"></div><span><b style="color:var(--cb)">Sky</b> — perfect tense</span></div>
        <div class="lg-item"><div class="lg-dot" style="background:var(--v)"></div><span><b style="color:var(--v)">Purple</b> — SSC vocab (hover!)</span></div>
      </div>
      <div class="how-to">
        <h3>📌 Kaise Add Karein</h3>
        <p><b style="color:var(--c1)">Grammar chapter:</b> <code>grammar-data.js</code> → sahi folder ke <code>chapters[]</code> mein push karo</p>
        <p><b style="color:var(--v)">Vocab story:</b> <code>vocab-data.js</code> → sahi batch ke <code>chapters[]</code> mein push karo</p>
        <p><b style="color:var(--c4)">Naya vocab batch:</b> <code>vocab-data.js</code> → <code>subfolders[]</code> mein nayi object push karo</p>
        <p><b style="color:var(--c3)">index.html kabhi nahi chhedna</b> — sirf data files edit karo! 🚀</p>
      </div>
    </div>`;
}

function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }

renderHome();
</script>

<script>
  // Register Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('[PWA] Service Worker registered:', reg.scope))
        .catch(err => console.log('[PWA] SW registration failed:', err));
    });
  }

  // PWA Install prompt
  let deferredPrompt;
  const installBtn = document.getElementById('installBtn');

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (installBtn) installBtn.style.display = 'flex';
  });

  window.addEventListener('appinstalled', () => {
    if (installBtn) installBtn.style.display = 'none';
    deferredPrompt = null;
    console.log('[PWA] App installed!');
  });

  function installApp() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(choice => {
      deferredPrompt = null;
      if (installBtn) installBtn.style.display = 'none';
    });
  }
</script>
</body>
</html>
